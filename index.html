<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STANDARDS — Movement Methodology</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gd:#0F6E56;--gm:#1D9E75;--gl:#E1F5EE;--dk:#0D0D0D;--md:#444;--mt:#888;--br:#E0E0DC;--bg:#F8F8F6;--cd:#FFF;--fn:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--red:#c0392b;--redbg:#FDECEA;--amber:#854F0B;--amberbg:#FAEEDA}
    body{font-family:var(--fn);background:var(--bg);color:var(--dk);min-height:100vh}
    #auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .auth-card{background:var(--cd);border:0.5px solid var(--br);border-radius:16px;padding:40px 36px;width:100%;max-width:400px}
    .auth-logo{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
    .auth-logo span{color:var(--gm)}
    .auth-sub{font-size:14px;color:var(--mt);margin-bottom:32px}
    .auth-tabs{display:flex;margin-bottom:24px;border:0.5px solid var(--br);border-radius:8px;overflow:hidden}
    .auth-tab{flex:1;padding:8px;font-size:13px;font-weight:500;border:none;background:transparent;cursor:pointer;color:var(--mt);font-family:var(--fn);transition:all .15s}
    .auth-tab.active{background:var(--dk);color:#fff}
    label{display:block;font-size:12px;font-weight:500;color:var(--md);margin-bottom:6px}
    input[type=text],input[type=email],input[type=password],input[type=date],input[type=number],select,textarea{width:100%;padding:10px 12px;border:0.5px solid var(--br);border-radius:8px;font-size:14px;font-family:var(--fn);background:var(--bg);color:var(--dk);margin-bottom:14px;outline:none;transition:border-color .15s}
    input:focus,select:focus,textarea:focus{border-color:var(--gm)}
    textarea{resize:vertical;min-height:72px}
    .btn{padding:11px 16px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--fn);transition:opacity .15s}
    .btn-full{width:100%}.btn-dk{background:var(--dk);color:#fff}.btn-gm{background:var(--gm);color:#fff}
    .btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;font-family:var(--fn);border:none;cursor:pointer;font-weight:500;transition:opacity .15s}
    .btn-sm:hover,.btn:hover{opacity:.85}
    .btn:disabled,.btn-sm:disabled{opacity:.4;cursor:not-allowed}
    .msg{font-size:13px;margin-top:10px;text-align:center;min-height:18px}
    .msg.err{color:var(--red)}.msg.ok{color:var(--gd)}
    #app{display:none}
    .topbar{background:var(--cd);border-bottom:0.5px solid var(--br);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .tl{font-size:18px;font-weight:700;letter-spacing:-.3px}.tl span{color:var(--gm)}
    .topbar-r{display:flex;align-items:center;gap:8px}
    .coach-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px;background:var(--dk);color:#fff}
    .tu{font-size:13px;color:var(--mt);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .btn-so{padding:5px 12px;font-size:12px;border:0.5px solid var(--br);background:transparent;border-radius:99px;cursor:pointer;color:var(--md);font-family:var(--fn)}
    .nav-tabs{display:flex;padding:0 16px;border-bottom:0.5px solid var(--br);background:var(--cd);overflow-x:auto;-webkit-overflow-scrolling:touch}
    .nav-tab{padding:10px 12px;font-size:13px;font-weight:500;border:none;background:transparent;cursor:pointer;color:var(--mt);border-bottom:2px solid transparent;margin-bottom:-0.5px;font-family:var(--fn);white-space:nowrap;transition:all .15s}
    .nav-tab.active{color:var(--gm);border-bottom-color:var(--gm)}
    .main{padding:16px;max-width:640px;margin:0 auto}
    .view{display:none}.view.active{display:block}
    .sl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mt);margin:18px 0 10px}
    .sl:first-child{margin-top:0}
    @keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
    .empty{text-align:center;padding:40px 20px;color:var(--mt);font-size:14px}
    .ei{font-size:32px;margin-bottom:8px}

    /* ── COACH STYLES ── */
    .coach-section{background:var(--dk);border-radius:12px;padding:14px 16px;margin-bottom:16px}
    .coach-section-title{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#666;margin-bottom:12px}
    .athlete-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#1a1a1a;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:background .15s;border:1px solid transparent}
    .athlete-row:hover{background:#222}
    .athlete-row.active{border-color:var(--gm)}
    .athlete-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
    .athlete-info{flex:1}
    .athlete-name{font-size:13px;font-weight:600;color:#fff}
    .athlete-sub{font-size:11px;color:#666;margin-top:1px}
    .athlete-score{font-size:16px;font-weight:700;color:var(--gm)}
    .athlete-bars{display:flex;gap:2px;margin-top:4px}
    .athlete-bar{width:8px;height:8px;border-radius:2px}

    /* Pending tests */
    .pending-card{background:#1a1a1a;border-radius:8px;padding:12px;margin-bottom:6px;border-left:3px solid #F0A500}
    .pending-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
    .pending-name{font-size:13px;font-weight:600;color:#fff}
    .pending-sub{font-size:11px;color:#666;margin-top:2px}
    .pending-date{font-size:11px;color:#666}
    .pending-notes{font-size:12px;color:#aaa;font-style:italic;margin-bottom:8px}
    .pending-actions{display:flex;gap:6px}
    .btn-pass{background:var(--gm);color:#fff;padding:5px 12px;font-size:12px;font-weight:600;border:none;border-radius:6px;cursor:pointer;font-family:var(--fn)}
    .btn-fail{background:var(--red);color:#fff;padding:5px 12px;font-size:12px;font-weight:600;border:none;border-radius:6px;cursor:pointer;font-family:var(--fn)}
    .btn-pass:hover,.btn-fail:hover{opacity:.85}

    /* Athlete profile in coach view */
    .coach-athlete-profile{background:var(--cd);border:0.5px solid var(--br);border-radius:12px;padding:14px;margin-bottom:14px;animation:fi .2s ease}
    .cap-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .cap-name{font-size:15px;font-weight:600}
    .cap-score{background:var(--gl);color:var(--gd);padding:4px 10px;border-radius:99px;font-size:13px;font-weight:600}
    .cap-close{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--br);background:transparent;cursor:pointer;font-size:13px;color:var(--mt);display:flex;align-items:center;justify-content:center}
    .cap-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .cap-pat{background:var(--bg);border:0.5px solid var(--br);border-radius:8px;padding:10px}
    .cap-pat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .cap-pat-name{font-size:12px;font-weight:600}
    .cap-level-ctrl{display:flex;align-items:center;gap:6px}
    .level-btn{width:22px;height:22px;border-radius:4px;border:0.5px solid var(--br);background:var(--cd);cursor:pointer;font-size:14px;font-weight:600;color:var(--dk);display:flex;align-items:center;justify-content:center;font-family:var(--fn);transition:all .15s;line-height:1}
    .level-btn:hover{background:var(--gm);color:#fff;border-color:var(--gm)}
    .level-btn:disabled{opacity:.3;cursor:not-allowed}
    .level-num{font-size:13px;font-weight:700;color:var(--gm);min-width:16px;text-align:center}
    .cap-ex{font-size:11px;color:var(--mt);margin-top:2px}
    .cap-std{font-size:11px;font-weight:600;color:var(--gm)}
    .cap-bar{height:3px;background:var(--br);border-radius:2px;margin-top:5px;overflow:hidden}
    .cap-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}

    /* PROFILE */
    .ph{background:var(--cd);border:0.5px solid var(--br);border-radius:16px;padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
    .av{width:50px;height:50px;border-radius:50%;background:var(--gl);color:var(--gd);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;flex-shrink:0}
    .pn{font-size:17px;font-weight:600}.ps{font-size:13px;color:var(--mt);margin-top:2px}
    .sc{margin-left:auto;background:var(--gl);color:var(--gd);padding:5px 12px;border-radius:99px;font-size:13px;font-weight:600;white-space:nowrap}
    .pg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .pc{background:var(--cd);border:0.5px solid var(--br);border-radius:12px;padding:12px;cursor:pointer;transition:border-color .15s,transform .1s}
    .pc:hover{border-color:#bbb;transform:translateY(-1px)}.pc.act{border-color:var(--gm);border-width:1.5px}
    .pt{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
    .pname{font-size:13px;font-weight:600}
    .lc{font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px}
    .bt{height:4px;background:var(--br);border-radius:2px;margin-bottom:5px;overflow:hidden}
    .bf{height:100%;border-radius:2px;transition:width .5s ease}
    .pb2{display:flex;justify-content:space-between}
    .pex{font-size:11px;color:var(--mt)}.pst{font-size:11px;font-weight:600;color:var(--gm)}
    .dc{background:var(--cd);border:0.5px solid var(--br);border-radius:12px;padding:14px;margin-bottom:14px;animation:fi .2s ease}
    .dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .dt{font-size:14px;font-weight:600}
    .dx{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--br);background:transparent;cursor:pointer;font-size:13px;color:var(--mt);display:flex;align-items:center;justify-content:center}
    .eb{padding:9px 0;border-bottom:0.5px solid var(--br)}.eb:last-of-type{border-bottom:none}
    .et{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-bottom:3px}
    .tm{background:var(--gl);color:var(--gd)}.tb{background:#EEEDFE;color:#534AB7}.tl2{background:#FAEEDA;color:#854F0B}
    .en{font-size:13px;font-weight:600;margin-bottom:1px}
    .er2{display:flex;justify-content:space-between;align-items:center}
    .ec{font-size:11px;color:var(--gm);font-style:italic}.em2{font-size:11px;color:var(--mt)}
    .ns{margin-top:10px;padding:9px 11px;background:var(--gl);border-radius:8px;font-size:12px;color:var(--gd)}
    .mlvl{margin-top:10px;padding:9px 11px;background:var(--gm);border-radius:8px;font-size:12px;color:#fff;font-weight:600}

    /* PROGRAMME */
    .week-bar{display:flex;align-items:center;justify-content:space-between;background:var(--cd);border:0.5px solid var(--br);border-radius:12px;padding:12px 16px;margin-bottom:14px}
    .week-info{font-size:14px;font-weight:600}.week-sub{font-size:12px;color:var(--mt);margin-top:1px}
    .week-nav{display:flex;gap:6px}
    .wn-btn{padding:5px 10px;font-size:12px;border:0.5px solid var(--br);background:transparent;border-radius:6px;cursor:pointer;font-family:var(--fn);color:var(--md)}
    .wn-btn:disabled{opacity:.3;cursor:not-allowed}
    .ds{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .db{padding:5px 12px;border-radius:99px;font-size:13px;font-weight:500;border:0.5px solid var(--br);background:var(--cd);cursor:pointer;font-family:var(--fn);transition:all .15s}
    .db.act{background:var(--dk);color:#fff;border-color:var(--dk)}
    .day-wrap{margin-bottom:16px}
    .day-hdr{background:var(--dk);border-radius:10px 10px 0 0;padding:11px 14px;display:flex;justify-content:space-between;align-items:center}
    .day-title{font-size:13px;font-weight:600;color:#fff}.day-vol{font-size:11px;color:#777}
    .circuit-wrap{border:0.5px solid var(--br);border-top:none;background:var(--cd)}
    .circuit-wrap:last-child{border-radius:0 0 10px 10px;overflow:hidden}
    .circuit-hdr{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--bg);border-bottom:0.5px solid var(--br);cursor:pointer;user-select:none}
    .circuit-hdr:hover{background:#f0f0ee}
    .circuit-letter{width:24px;height:24px;border-radius:6px;background:var(--dk);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .circuit-label{font-size:12px;font-weight:600;color:var(--md);flex:1}
    .circuit-sets{font-size:12px;color:var(--mt)}.circuit-arrow{font-size:11px;color:var(--mt)}
    .circuit-body{display:none}.circuit-body.open{display:block}
    .cx{border-bottom:0.5px solid var(--br);padding:12px 14px}.cx:last-child{border-bottom:none}
    .cx-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
    .cx-slot{font-size:10px;font-weight:700;color:var(--mt);letter-spacing:.08em;margin-right:8px;flex-shrink:0}
    .cx-name{font-size:14px;font-weight:600;flex:1}
    .cx-badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
    .cx-meta{font-size:12px;color:var(--mt);margin-bottom:4px}
    .cx-cue{font-size:11px;color:var(--gm);font-style:italic;margin-bottom:6px}
    .set-logger{display:flex;flex-direction:column;gap:3px}
    .set-row{display:flex;align-items:center;gap:5px;padding:5px 7px;background:var(--bg);border-radius:6px;border:0.5px solid var(--br)}
    .set-num{font-size:11px;font-weight:600;color:var(--mt);width:34px;flex-shrink:0}
    .set-inp{flex:1;padding:4px 7px;border:0.5px solid var(--br);border-radius:5px;font-size:13px;font-family:var(--fn);background:var(--cd);color:var(--dk);margin-bottom:0;outline:none;min-width:0}
    .set-inp:focus{border-color:var(--gm)}.set-inp.done{background:var(--gl);border-color:var(--gm);color:var(--gd)}
    .set-btn{padding:4px 9px;font-size:11px;font-weight:600;border:none;border-radius:5px;cursor:pointer;font-family:var(--fn);background:var(--gm);color:#fff;flex-shrink:0;white-space:nowrap}
    .set-btn.done{background:var(--gl);color:var(--gd);cursor:default}
    .load-hint{font-size:11px;color:var(--mt);margin-bottom:4px}

    /* HISTORY */
    .hist-card{background:var(--cd);border:0.5px solid var(--br);border-radius:10px;overflow:hidden;margin-bottom:10px}
    .hist-hdr{padding:10px 14px;background:var(--bg);border-bottom:0.5px solid var(--br);display:flex;justify-content:space-between}
    .hist-title{font-size:13px;font-weight:600}.hist-count{font-size:12px;color:var(--mt)}
    .hist-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:0.5px solid var(--br);font-size:13px}
    .hist-row:last-child{border-bottom:none}
    .hist-ex{font-weight:500;color:var(--dk)}.hist-res{color:var(--gm);font-weight:600}

    /* TEST LOG */
    .tf{background:var(--cd);border:0.5px solid var(--br);border-radius:12px;padding:18px;margin-bottom:16px}
    .tft{font-size:14px;font-weight:600;margin-bottom:14px}
    .tpend{background:var(--cd);border:0.5px solid var(--br);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
    .tpl{flex:1}.tpn{font-size:13px;font-weight:600}.tps{font-size:12px;color:var(--mt);margin-top:2px}
    .tpr{text-align:right}.td2{font-size:11px;color:var(--mt)}
    .sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
    .sp{background:#F0A500}.spass{background:var(--gm)}.sfail{background:var(--red)}

    /* LEADERBOARD */
    .lbf{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
    .lbfb{padding:4px 10px;border-radius:99px;font-size:12px;font-weight:500;border:0.5px solid var(--br);background:var(--cd);color:var(--mt);cursor:pointer;font-family:var(--fn);transition:all .15s}
    .lbfb.act{background:var(--gl);color:var(--gd);border-color:var(--gm)}
    .lbr{background:var(--cd);border:0.5px solid var(--br);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
    .lbr.me{border-color:var(--gm);border-width:1.5px}
    .lbrk{font-size:18px;font-weight:700;width:26px;text-align:center;flex-shrink:0}
    .r1{color:#B8860B}.r2{color:#888}.r3{color:#8B4513}
    .lbav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
    .lbi{flex:1}.lbn{font-size:13px;font-weight:600}.lbns{font-size:12px;color:var(--mt)}
    .lbs{text-align:right}.lbsn{font-size:20px;font-weight:700;color:var(--gm);line-height:1}.lbsd{font-size:11px;color:var(--mt)}
    .lbmb{display:flex;gap:2px;margin-top:4px}.lbmbs{width:8px;height:8px;border-radius:2px}
    @media(max-width:420px){.pg{grid-template-columns:1fr}.cap-grid{grid-template-columns:1fr}.auth-card{padding:28px 18px}}
  </style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">STAND<span>ARDS</span></div>
    <div class="auth-sub">Movement methodology. Know your level.</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign in</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign up</button>
    </div>
    <div id="lf">
      <label>Email</label><input type="email" id="le" placeholder="you@email.com"/>
      <label>Password</label><input type="password" id="lp" placeholder="••••••••"/>
      <button class="btn btn-full btn-dk" onclick="signIn()">Sign in</button>
    </div>
    <div id="sf" style="display:none">
      <label>Full name</label><input type="text" id="sn" placeholder="Your name"/>
      <label>Email</label><input type="email" id="se" placeholder="you@email.com"/>
      <label>Password</label><input type="password" id="sp2" placeholder="Min 6 characters"/>
      <button class="btn btn-full btn-dk" onclick="signUp()">Create account</button>
    </div>
    <div class="msg" id="am"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tl">STAND<span>ARDS</span></div>
    <div class="topbar-r">
      <span id="coach-badge" class="coach-badge" style="display:none">Coach</span>
      <span class="tu" id="tu"></span>
      <button class="btn-so" onclick="signOut()">Sign out</button>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('profile',this)">Profile</button>
    <button class="nav-tab" onclick="showTab('programme',this)">Programme</button>
    <button class="nav-tab" onclick="showTab('history',this)">History</button>
    <button class="nav-tab" onclick="showTab('testlog',this)">Log Test</button>
    <button class="nav-tab" onclick="showTab('leaderboard',this)">Leaderboard</button>
  </div>
  <div class="main">
    <div id="v-profile" class="view active"></div>
    <div id="v-programme" class="view"></div>
    <div id="v-history" class="view"></div>
    <div id="v-testlog" class="view"></div>
    <div id="v-leaderboard" class="view"></div>
  </div>
</div>

<script>
const{createClient}=supabase;
const sb=createClient(
  'https://pczfamrjdwbeejoxhxnq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjemZhbXJqZHdiZWVqb3hoeG5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3ODAzNjEsImV4cCI6MjA4OTM1NjM2MX0.trUIKdNicHPRDmleAYoF3nAg8unqQrnQCjKTPB63bI0'
);

// ── STATE ──
let CU=null,IS_COACH=false,STD=[],EX=[],AP={},AAP=[],LOGS=[],SETS=[];
let ALL_ATHLETES=[],ALL_PENDING=[],selAthlete=null;
let selPat=null,lbF='all',pDays=3,curWeek=1,openCircuits={};

const PATS=['Squat','Hinge','HPush','VPush','HPull','VPull','Carry','Core'];
const PL={Squat:'Squat',Hinge:'Hinge',HPush:'H.Push',VPush:'V.Push',HPull:'H.Pull',VPull:'V.Pull',Carry:'Carry',Core:'Core'};
const PF={Squat:'Squat',Hinge:'Hinge',HPush:'Horizontal Push',VPush:'Vertical Push',HPull:'Horizontal Pull',VPull:'Vertical Pull',Carry:'Carry',Core:'Core'};

const LL=['#f4f4f2','#E8F2EC','#D4EDE1','#C0E8D4','#A8DFC8','#8FD4BC'];

// ── DATA ──
async function load(){
  try{
    // Check if coach
    const{data:prof}=await sb.from('profiles').select('role').eq('id',CU.id).single();
    IS_COACH=prof?.role==='coach';
    document.getElementById('coach-badge').style.display=IS_COACH?'inline-flex':'none';

    const queries=[
      sb.from('standards').select('*').order('pattern_id').order('level'),
      sb.from('exercises').select('*'),
      sb.from('athlete_profiles').select('*').eq('athlete_id',CU.id),
      sb.from('athlete_profiles').select('*,profiles(full_name,email)'),
      sb.from('assessments').select('*').eq('athlete_id',CU.id).order('assessed_at',{ascending:false}),
      sb.from('workout_sets').select('*').eq('athlete_id',CU.id).order('logged_at',{ascending:false}),
    ];

    if(IS_COACH){
      queries.push(sb.from('athlete_profiles').select('*,profiles(full_name,email,role)'));
      queries.push(sb.from('assessments').select('*,profiles(full_name)').is('passed',null).order('assessed_at',{ascending:false}));
    }

    const results=await Promise.all(queries);
    STD=results[0].data||[];EX=results[1].data||[];
    AP={};(results[2].data||[]).forEach(r=>{AP[r.pattern_id]=r.current_level});
    AAP=results[3].data||[];LOGS=results[4].data||[];SETS=results[5].data||[];

    if(IS_COACH){
      // Build athlete map from all profiles
      const athleteMap={};
      (results[6].data||[]).forEach(r=>{
        if(r.profiles?.role==='coach')return; // exclude coaches from athlete list
        const id=r.athlete_id;
        if(!athleteMap[id])athleteMap[id]={id,name:r.profiles?.full_name||r.profiles?.email||'Athlete',email:r.profiles?.email||'',scores:{}};
        athleteMap[id].scores[r.pattern_id]=r.current_level;
      });
      ALL_ATHLETES=Object.values(athleteMap);
      ALL_PENDING=results[7].data||[];
    }

    rProfile();rProg();rHistory();rTestLog();rLB();
  }catch(err){
    console.error('Load error:',err);
    document.getElementById('v-profile').innerHTML=`<div class="empty"><div class="ei">⚠️</div>${err.message}<br><br><button class="btn btn-dk" onclick="load()" style="margin-top:8px">Retry</button></div>`;
  }
}

// ── COACH: SET ATHLETE LEVEL ──
async function setLevel(athleteId,patId,newLevel){
  if(newLevel<0||newLevel>5)return;
  const{error}=await sb.from('athlete_profiles').upsert({
    athlete_id:athleteId,pattern_id:patId,current_level:newLevel,
    passed_at:newLevel>0?new Date().toISOString():null,updated_at:new Date().toISOString()
  },{onConflict:'athlete_id,pattern_id'});
  if(error){alert('Error: '+error.message);return;}
  // Update local state
  const a=ALL_ATHLETES.find(x=>x.id===athleteId);
  if(a)a.scores[patId]=newLevel;
  if(athleteId===CU.id)AP[patId]=newLevel;
  rCoachAthleteProfile(athleteId);
  rProfile();
}

// ── COACH: APPROVE / FAIL TEST ──
async function judgeTest(assessmentId,athleteId,patId,level,pass){
  const{error}=await sb.from('assessments').update({passed:pass}).eq('id',assessmentId);
  if(error){alert('Error: '+error.message);return;}
  if(pass){
    // Update athlete level
    const current=ALL_ATHLETES.find(x=>x.id===athleteId)?.scores[patId]||0;
    if(level>current)await setLevel(athleteId,patId,level);
  }
  // Remove from pending list
  ALL_PENDING=ALL_PENDING.filter(p=>p.id!==assessmentId);
  rProfile(); // re-render to update pending count
}

// ── COACH: RENDER ATHLETE ROSTER ──
function rCoachRoster(){
  if(!IS_COACH||!ALL_ATHLETES.length)return'';
  const pendingCount=ALL_PENDING.length;
  let h=`<div class="coach-section">
    <div class="coach-section-title">Athletes (${ALL_ATHLETES.length})</div>`;

  // Pending tests banner
  if(pendingCount>0){
    h+=`<div style="background:#2a2000;border:1px solid #F0A500;border-radius:8px;padding:10px 12px;margin-bottom:10px">
      <div style="font-size:12px;font-weight:600;color:#F0A500;margin-bottom:8px">⏳ ${pendingCount} test${pendingCount>1?'s':''} pending review</div>`;
    ALL_PENDING.forEach(p=>{
      const std=STD.find(s=>s.pattern_id===p.pattern_id&&s.level===p.level_tested);
      const dt=new Date(p.assessed_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
      h+=`<div class="pending-card">
        <div class="pending-top">
          <div><div class="pending-name">${p.profiles?.full_name||'Athlete'}</div><div class="pending-sub">${PF[p.pattern_id]||p.pattern_id} — Level ${p.level_tested} · ${std?.test_exercise||'—'}</div></div>
          <div class="pending-date">${dt}</div>
        </div>
        ${p.notes?`<div class="pending-notes">"${p.notes}"</div>`:''}
        <div class="pending-actions">
          <button class="btn-pass" onclick="judgeTest('${p.id}','${p.athlete_id}','${p.pattern_id}',${p.level_tested},true)">✓ Pass</button>
          <button class="btn-fail" onclick="judgeTest('${p.id}','${p.athlete_id}','${p.pattern_id}',${p.level_tested},false)">✕ Fail</button>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Athlete list
  ALL_ATHLETES.sort((a,b)=>{
    const sa=PATS.reduce((s,p)=>s+(a.scores[p]||0),0);
    const sb2=PATS.reduce((s,p)=>s+(b.scores[p]||0),0);
    return sb2-sa;
  }).forEach((a,i)=>{
    const total=PATS.reduce((s,p)=>s+(a.scores[p]||0),0);
    const init=gi(a.name),c=AVC[i%AVC.length];
    const bars=PATS.map(p=>`<div class="athlete-bar" style="background:${LC[a.scores[p]||0]}"></div>`).join('');
    h+=`<div class="athlete-row${selAthlete===a.id?' active':''}" onclick="selectAthlete('${a.id}')">

        <div class="athlete-name">${a.name}</div>
        <div class="athlete-bars">${bars}</div>
      </div>
      <div class="athlete-score">${total}</div>
    </div>`;
  });
  h+=`</div>`;

  // Selected athlete profile
  if(selAthlete)h+=rCoachAthleteProfile(selAthlete,true);

  return h;
}

// ── PROGRAMME ENGINE ──
function getSetTargets(){
  const ranked=[...PATS].sort((a,b)=>(AP[a]||0)-(AP[b]||0));
  const t={};ranked.forEach((p,i)=>{t[p]=i<2?20:i<6?15:10});return t;
}
function getExercise(pid,type){
  const lv=AP[pid]||0;if(lv===0)return null;
  return EX.find(e=>e.pattern_id===pid&&e.level_focus===lv&&e.type===type)||EX.find(e=>e.pattern_id===pid&&e.level_focus===lv)||null;
}
function repStr(intent,sets,week){
  const r=RR[intent]||RR.Control,wib=((week-1)%4)+1;
  let lo=r.lo,hi=r.hi,s=sets;
  if(wib===2)hi++;if(wib===3)hi+=2;if(wib===4)s=Math.max(2,s-1);
  return{str:`${s}×${lo}–${hi}`,sets:s,lo,hi};
}
function suggestedLoad(exId,intent){
  if(!exId)return null;
  const prev=SETS.filter(s=>s.exercise_id===exId).sort((a,b)=>new Date(b.logged_at)-new Date(a.logged_at));
  if(!prev.length||!prev[0].load_kg||!prev[0].reps_achieved)return null;
  const last=prev[0],range=RR[intent]||RR.Control;
  let load=last.load_kg;
  if(last.reps_achieved>=range.hi)load=Math.round(load*1.05*2)/2;
  return load;
}
function buildProgramme(){
  const setTargets=getSetTargets(),plans=DAY_PLANS[pDays],circuitMap={};
  CIRCUIT_TEMPLATES.forEach(c=>{circuitMap[c.id]=c});
  const patAppearances={};PATS.forEach(p=>{patAppearances[p]=0});
  plans.forEach(dc=>dc.forEach(cid=>{const t=circuitMap[cid];if(t)t.pats.forEach(p=>{patAppearances[p]++})}));
  return plans.map((dayCircuits,di)=>({
    label:`Day ${di+1}`,
    circuits:dayCircuits.map((cid,ci)=>{
      const tmpl=circuitMap[cid];if(!tmpl)return null;
      const pwl=tmpl.pats.map(p=>({pid:p,lv:AP[p]||0}));
      pwl.sort((a,b)=>a.lv-b.lv);
      const types=['Main','Bridge','Limiter'],ta={};
      pwl.forEach((p,i)=>{ta[p.pid]=types[Math.min(i,2)]});
      const exList=[];
      pwl.forEach(({pid})=>{
        const weeklyTarget=setTargets[pid]||15;
        const appearances=Math.max(1,patAppearances[pid]);
        const sessionSets=Math.round(weeklyTarget/appearances);
        const mainSets=Math.min(4,Math.max(2,Math.round(sessionSets*0.4)));
        const bridgeSets=Math.min(4,Math.max(2,Math.round(sessionSets*0.35)));
        const limiterSets=Math.min(4,Math.max(2,sessionSets-mainSets-bridgeSets));
        const setSplit={Main:mainSets,Bridge:bridgeSets,Limiter:limiterSets};
        const type=ta[pid];
        if(type==='Main'){
          const ex=getExercise(pid,'Main');
          exList.unshift({pid,type:'Main',ex,sets:mainSets});
        } else {
          const ex=getExercise(pid,type)||getExercise(pid,'Bridge');
          exList.push({pid,type,ex,sets:setSplit[type]||2});
        }
      });
      return{id:cid,letter:String.fromCharCode(65+ci),name:tmpl.name,exercises:exList,totalSets:exList.reduce((s,e)=>s+e.sets,0)};
    }).filter(Boolean)
  }));
}

function rProg(){
  const hasLvl=PATS.some(p=>(AP[p]||0)>0);
  const wib=((curWeek-1)%4)+1,wl=['','Base','Build','Overreach','Deload'];
  let h=`<div class="week-bar"><div><div class="week-info">Week ${curWeek} <span style="font-size:12px;font-weight:400;color:var(--mt)">— ${wl[wib]}</span></div><div class="week-sub">Block ${Math.ceil(curWeek/4)}</div></div><div class="week-nav"><button class="wn-btn" onclick="changeWeek(-1)" ${curWeek<=1?'disabled':''}>← Prev</button><button class="wn-btn" onclick="changeWeek(1)">Next →</button></div></div>
  <div class="sl">Training days</div><div class="ds">${[3,4,5].map(d=>`<button class="db${pDays===d?' act':''}" onclick="setPD(${d})">${d} days/week</button>`).join('')}</div>
  <div class="sl">Your programme</div>`;
  if(!hasLvl){h+=`<div class="empty"><div class="ei">📋</div>No levels set yet. Your programme will appear once your coach has assessed you.</div>`;document.getElementById('v-programme').innerHTML=h;return}
  buildProgramme().forEach((day,di)=>{
    const totalDaySets=day.circuits.reduce((s,c)=>s+c.totalSets,0);
    h+=`<div class="day-wrap"><div class="day-hdr"><span class="day-title">${day.label}</span><span class="day-vol">${totalDaySets} sets</span></div>`;
    day.circuits.forEach((circuit,ci)=>{
      const ck=`d${di}c${ci}`,isOpen=!!openCircuits[ck];
      h+=`<div class="circuit-wrap"><div class="circuit-hdr" onclick="toggleCircuit('${ck}')"><div class="circuit-letter">${circuit.letter}</div><span class="circuit-label">${circuit.name} circuit</span><span class="circuit-sets">${circuit.totalSets} sets</span><span class="circuit-arrow">${isOpen?'▲':'▼'}</span></div><div class="circuit-body${isOpen?' open':''}" id="cb-${ck}">`;
      circuit.exercises.forEach((item,xi)=>{
        const slot=`${circuit.letter}${xi+1}`,ex=item.ex,intent=ex?.intent||'Force';
        const rs=repStr(intent,item.sets,curWeek),tagCls=item.type==='Main'?'tm':item.type==='Bridge'?'tb':'tl2';
        const exName=ex?ex.name:(STD.find(s=>s.pattern_id===item.pid&&s.level===(AP[item.pid]||0))?.test_exercise||`${PF[item.pid]} — not assessed`);
        const sug=ex?.id?suggestedLoad(ex.id,intent):null;
        let setRows='';
        for(let s=1;s<=rs.sets;s++){
          const prev=SETS.find(ws=>ws.exercise_id===ex?.id&&ws.set_number===s&&ws.week_number===curWeek);
          const logged=!!prev,uid=`${ck}-${ex?.id||item.pid}-${s}`;
          setRows+=`<div class="set-row"><span class="set-num">Set ${s}</span><input class="set-inp${logged?' done':''}" type="number" id="r-${uid}" placeholder="Reps" value="${logged?prev.reps_achieved:''}" min="1" max="50" ${logged?'disabled':''}/><input class="set-inp${logged?' done':''}" type="number" id="l-${uid}" placeholder="kg" value="${logged&&prev.load_kg?prev.load_kg:''}" min="0" max="500" step="0.5" ${logged?'disabled':''}/><button class="set-btn${logged?' done':''}" onclick="logSet('${uid}','${ex?.id||''}','${item.pid}',${s},${rs.lo},${rs.hi})" ${logged?'disabled':''}>${logged?'✓':'Log'}</button></div>`;
        }
        h+=`<div class="cx"><div class="cx-top"><span class="cx-slot">${slot}</span><span class="cx-name">${exName}</span><span class="cx-badge ${tagCls}">${item.type}</span></div><div class="cx-meta">${rs.str} · ${TM[intent]||'20X0'} · Rest ${REST[item.type]||'60s'} · ${PL[item.pid]} L${AP[item.pid]||0}</div>${ex?.coaching_cue?`<div class="cx-cue">"${ex.coaching_cue}"</div>`:''}${sug?`<div class="load-hint">Suggested: <strong>${sug}kg</strong></div>`:''}<div class="set-logger">${setRows}</div></div>`;
      });
      h+=`</div></div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('v-programme').innerHTML=h;
}
function toggleCircuit(key){
  openCircuits[key]=!openCircuits[key];
  const body=document.getElementById('cb-'+key);
  if(body)body.classList.toggle('open',!!openCircuits[key]);
  const arr=body?.previousElementSibling?.querySelector('.circuit-arrow');
  if(arr)arr.textContent=openCircuits[key]?'▲':'▼';
}
function changeWeek(d){curWeek=Math.max(1,curWeek+d);openCircuits={};rProg()}
function setPD(n){pDays=n;openCircuits={};rProg()}
async function logSet(uid,exId,patId,setNum,repLo,repHi){
  const rEl=document.getElementById('r-'+uid),lEl=document.getElementById('l-'+uid);
  const reps=parseInt(rEl?.value),load=parseFloat(lEl?.value)||null;
  if(!reps||reps<1){alert('Enter reps achieved.');return}
  const{error}=await sb.from('workout_sets').insert({athlete_id:CU.id,exercise_id:exId?parseInt(exId):null,pattern_id:patId,session_date:new Date().toISOString().split('T')[0],week_number:curWeek,set_number:setNum,reps_achieved:reps,load_kg:load,reps_target_low:repLo,reps_target_high:repHi});
  if(error){alert('Error: '+error.message);return}
  [rEl,lEl].forEach(el=>{if(el){el.classList.add('done');el.disabled=true}});
  const btn=document.querySelector(`[onclick="logSet('${uid}','${exId}','${patId}',${setNum},${repLo},${repHi})"]`);
  if(btn){btn.textContent='✓';btn.classList.add('done');btn.disabled=true}
  SETS.unshift({exercise_id:exId?parseInt(exId):null,pattern_id:patId,week_number:curWeek,set_number:setNum,reps_achieved:reps,load_kg:load,reps_target_low:repLo,reps_target_high:repHi,logged_at:new Date().toISOString()});
}

// ── HISTORY ──
function rHistory(){
  if(!SETS.length){document.getElementById('v-history').innerHTML=`<div class="empty"><div class="ei">📊</div>No sessions logged yet.</div>`;return}
  const byDate={};
  SETS.forEach(s=>{const d=s.session_date||s.logged_at?.split('T')[0]||'Unknown';if(!byDate[d])byDate[d]=[];byDate[d].push(s)});
  let h=`<div class="sl">Session history</div>`;
  Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,30).forEach(([date,sets])=>{
    const label=new Date(date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    h+=`<div class="hist-card"><div class="hist-hdr"><span class="hist-title">Session — ${label}</span><span class="hist-count">${sets.length} sets</span></div>`;
    const byEx={};
    sets.forEach(s=>{const nm=EX.find(e=>e.id===s.exercise_id)?.name||PF[s.pattern_id]||'Exercise';if(!byEx[nm])byEx[nm]=[];byEx[nm].push(s)});
    Object.entries(byEx).forEach(([nm,exSets])=>{
      exSets.sort((a,b)=>a.set_number-b.set_number).forEach(s=>{
        const hitTop=s.reps_target_high&&s.reps_achieved>=s.reps_target_high,loadStr=s.load_kg?` @ ${s.load_kg}kg`:'';
        h+=`<div class="hist-row"><span class="hist-ex">${nm} · Set ${s.set_number}</span><span class="hist-res">${s.reps_achieved} reps${loadStr}${hitTop?' ↑':''}</span></div>`;
      });
    });
    h+=`</div>`;
  });
  document.getElementById('v-history').innerHTML=h;
}

// ── TEST LOG ──
function rTestLog(){
  let h=`<div class="sl">Log a level test</div><div class="tf"><div class="tft">Record a test attempt</div><label>Movement pattern</label><select id="tpat" onchange="uTL()"><option value="">Select pattern…</option>${PATS.map(p=>`<option value="${p}">${PF[p]}</option>`).join('')}</select><label>Level attempted</label><select id="tlvl"><option value="">Select pattern first…</option></select><label>Date</label><input type="date" id="tdate" value="${new Date().toISOString().split('T')[0]}"/><label>Notes for coach (optional)</label><textarea id="tnotes" placeholder="How did it feel? Any observations…"></textarea><button class="btn btn-full btn-gm" onclick="subTest()">Submit for coach review</button><div class="msg" id="tm2"></div></div>`;
  if(LOGS.length){
    h+=`<div class="sl">Your test history</div>`;
    LOGS.forEach(log=>{
      const std=STD.find(s=>s.pattern_id===log.pattern_id&&s.level===log.level_tested),sc=log.passed===true?'spass':log.passed===false?'sfail':'sp',sl=log.passed===true?'Passed':log.passed===false?'Failed':'Pending review',dt=new Date(log.assessed_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      h+=`<div class="tpend"><div class="tpl"><div class="tpn">${PF[log.pattern_id]} — Level ${log.level_tested}</div><div class="tps">${std?.test_exercise||'—'} · ${std?.load_standard||'—'}</div>${log.notes?`<div style="font-size:11px;color:var(--mt);margin-top:2px">"${log.notes}"</div>`:''}</div><div class="tpr"><div><span class="sdot ${sc}"></span><span style="font-size:12px;font-weight:500">${sl}</span></div><div class="td2">${dt}</div></div></div>`;
    });
  } else h+=`<div class="empty" style="padding:20px 0"><div class="ei">📝</div>No tests logged yet.</div>`;
  document.getElementById('v-testlog').innerHTML=h;
}
function uTL(){
  const pid=document.getElementById('tpat').value,sel=document.getElementById('tlvl');
  if(!pid){sel.innerHTML='<option>Select pattern first…</option>';return}
  sel.innerHTML=STD.filter(s=>s.pattern_id===pid).map(s=>`<option value="${s.level}"${s.level===(AP[pid]||0)+1?' selected':''}>Level ${s.level} — ${s.test_exercise} (${s.load_standard})</option>`).join('');
}
async function subTest(){
  const pid=document.getElementById('tpat').value,lv=parseInt(document.getElementById('tlvl').value),dt=document.getElementById('tdate').value,nt=document.getElementById('tnotes').value.trim(),me=document.getElementById('tm2');
  if(!pid||!lv){me.textContent='Please select a pattern and level.';me.className='msg err';return}
  me.textContent='Submitting…';me.className='msg';
  const{error}=await sb.from('assessments').insert({athlete_id:CU.id,pattern_id:pid,level_tested:lv,passed:null,notes:nt||null,assessed_at:dt?new Date(dt).toISOString():new Date().toISOString()});
  if(error){me.textContent='Error: '+error.message;me.className='msg err';return}
  me.textContent='Logged! Your coach will review it.';me.className='msg ok';
  const{data}=await sb.from('assessments').select('*').eq('athlete_id',CU.id).order('assessed_at',{ascending:false});
  LOGS=data||[];setTimeout(()=>rTestLog(),1500);
}

// ── LEADERBOARD ──
function rLB(){
  const am={};
  AAP.forEach(r=>{const id=r.athlete_id;if(!am[id])am[id]={id,name:r.profiles?.full_name||r.profiles?.email||'Athlete',scores:{}};am[id].scores[r.pattern_id]=r.current_level});
  let aths=Object.values(am).map((a,i)=>({...a,ds:lbF==='all'?PATS.reduce((s,p)=>s+(a.scores[p]||0),0):(a.scores[lbF]||0),ms:lbF==='all'?40:5,ci:i%AVC.length})).sort((a,b)=>b.ds-a.ds);
  const fl={all:'All',Squat:'Squat',Hinge:'Hinge',HPush:'H.Push',VPush:'V.Push',HPull:'H.Pull',VPull:'V.Pull',Carry:'Carry',Core:'Core'};
  let h=`<div class="lbf">${['all',...PATS].map(f=>`<button class="lbfb${lbF===f?' act':''}" onclick="sLBF('${f}')">${fl[f]}</button>`).join('')}</div>`;
  if(!aths.length)h+=`<div class="empty"><div class="ei">🏆</div>No athletes on the board yet.</div>`;
  else aths.forEach((a,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'',me=a.id===CU.id,c=AVC[a.ci],init=gi(a.name);
    let mb='';if(lbF==='all'){mb=`<div class="lbmb">`;PATS.forEach(p=>{mb+=`<div class="lbmbs" style="background:${LC[a.scores[p]||0]}"></div>`});mb+=`</div>`}
    h+=`<div class="lbr${me?' me':''}"><div class="lbrk ${rc}">${i+1}</div><div class="lbav" style="background:${c.bg};color:${c.fg}">${init}</div><div class="lbi"><div class="lbn">${a.name}${me?' <span style="font-size:11px;color:var(--gm)">(you)</span>':''}</div><div class="lbns">${lbF==='all'?'Overall movement profile':fl[lbF]+' pattern'}</div>${mb}</div><div class="lbs"><div class="lbsn">${a.ds}</div><div class="lbsd">/ ${a.ms}</div></div></div>`;
  });
  document.getElementById('v-leaderboard').innerHTML=h;
}
function sLBF(f){lbF=f;rLB()}

// ── TABS / UTILS ──
function showTab(t,btn){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));document.getElementById('v-'+t).classList.add('active');btn.classList.add('active')}
function gi(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
</script>
