<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STANDARDS — Movement Methodology</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #0F6E56;
      --green-mid: #1D9E75;
      --green-light: #E1F5EE;
      --green-pale: #F0FAF6;
      --l1: #1A3A2A; --l1bg: #E8F2EC;
      --l2: #1D6B45; --l2bg: #D4EDE1;
      --l3: #1D9E75; --l3bg: #C0E8D4;
      --l4: #5DCAA5; --l4bg: #A8DFC8;
      --l5: #3DBFA0; --l5bg: #8FD4BC;
      --dark: #0D0D0D;
      --mid: #444;
      --muted: #888;
      --border: #E0E0DC;
      --bg: #F8F8F6;
      --card: #FFFFFF;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── AUTH ── */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    .auth-logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -.5px;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .auth-logo span { color: var(--green-mid); }
    .auth-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 0.5px solid var(--border); border-radius: 8px; overflow: hidden; }
    .auth-tab { flex: 1; padding: 8px; font-size: 13px; font-weight: 500; border: none; background: transparent; cursor: pointer; color: var(--muted); transition: all .15s; }
    .auth-tab.active { background: var(--dark); color: #fff; }
    label { display: block; font-size: 12px; font-weight: 500; color: var(--mid); margin-bottom: 6px; }
    input[type=text], input[type=email], input[type=password] {
      width: 100%; padding: 10px 12px; border: 0.5px solid var(--border);
      border-radius: 8px; font-size: 14px; font-family: var(--font);
      background: var(--bg); color: var(--dark); margin-bottom: 16px;
      outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--green-mid); }
    .btn-primary {
      width: 100%; padding: 11px; background: var(--dark); color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: var(--font); transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .auth-msg { font-size: 13px; margin-top: 12px; text-align: center; min-height: 20px; }
    .auth-msg.error { color: #c0392b; }
    .auth-msg.success { color: var(--green-dark); }

    /* ── APP SHELL ── */
    #app { display: none; }
    .topbar {
      background: var(--card);
      border-bottom: 0.5px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo { font-size: 18px; font-weight: 700; color: var(--dark); letter-spacing: -.3px; }
    .topbar-logo span { color: var(--green-mid); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-user { font-size: 13px; color: var(--muted); }
    .btn-signout { padding: 5px 12px; font-size: 12px; border: 0.5px solid var(--border); background: transparent; border-radius: 99px; cursor: pointer; color: var(--mid); font-family: var(--font); }
    .btn-signout:hover { background: var(--bg); }

    .nav-tabs {
      display: flex;
      gap: 0;
      padding: 12px 20px 0;
      border-bottom: 0.5px solid var(--border);
      background: var(--card);
    }
    .nav-tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -0.5px;
      font-family: var(--font);
      transition: all .15s;
    }
    .nav-tab.active { color: var(--green-mid); border-bottom-color: var(--green-mid); }

    .main { padding: 20px; max-width: 600px; margin: 0 auto; }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    .spinner {
      width: 24px; height: 24px; border: 2px solid var(--border);
      border-top-color: var(--green-mid); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PROFILE VIEW ── */
    .profile-header {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--green-light); color: var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 600; flex-shrink: 0;
    }
    .profile-name { font-size: 18px; font-weight: 600; }
    .profile-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .score-chip {
      margin-left: auto;
      background: var(--green-light);
      color: var(--green-dark);
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .patterns-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .pattern-card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
    }
    .pattern-card:hover { border-color: #aaa; transform: translateY(-1px); }
    .pattern-card.active { border-color: var(--green-mid); border-width: 1.5px; }

    .pattern-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .pattern-name { font-size: 13px; font-weight: 600; }
    .level-chip {
      font-size: 11px; font-weight: 600; padding: 2px 8px;
      border-radius: 99px;
    }
    .bar-track { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
    .pattern-bottom { display: flex; justify-content: space-between; align-items: center; }
    .pattern-ex { font-size: 11px; color: var(--muted); }
    .pattern-std { font-size: 11px; font-weight: 600; color: var(--green-mid); }

    /* ── EXERCISE DETAIL ── */
    .detail-card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .detail-title { font-size: 15px; font-weight: 600; }
    .detail-close { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid var(--border); background: transparent; cursor: pointer; font-size: 14px; color: var(--muted); display: flex; align-items: center; justify-content: center; }

    .ex-block { padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .ex-block:last-of-type { border-bottom: none; }
    .ex-type-tag {
      display: inline-block; font-size: 10px; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 4px; margin-bottom: 4px;
    }
    .tag-main { background: var(--green-light); color: var(--green-dark); }
    .tag-bridge { background: #EEEDFE; color: #534AB7; }
    .tag-limiter { background: #FAEEDA; color: #854F0B; }
    .ex-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .ex-row-bottom { display: flex; justify-content: space-between; align-items: center; }
    .ex-cue { font-size: 12px; color: var(--green-mid); font-style: italic; }
    .ex-sets { font-size: 12px; color: var(--muted); }

    .next-standard {
      margin-top: 12px; padding: 10px 12px;
      background: var(--green-light); border-radius: 8px;
      font-size: 12px; color: var(--green-dark);
    }
    .next-standard strong { font-weight: 600; }
    .max-level {
      margin-top: 12px; padding: 10px 12px;
      background: var(--green-mid); border-radius: 8px;
      font-size: 12px; color: #fff; font-weight: 600;
    }

    /* ── LEADERBOARD ── */
    .lb-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .lb-filter {
      padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 500;
      border: 0.5px solid var(--border); background: var(--card);
      color: var(--muted); cursor: pointer; font-family: var(--font); transition: all .15s;
    }
    .lb-filter.active { background: var(--green-light); color: var(--green-dark); border-color: var(--green-mid); }

    .lb-row {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .15s;
    }
    .lb-row.me { border-color: var(--green-mid); border-width: 1.5px; }
    .lb-rank { font-size: 20px; font-weight: 700; width: 28px; text-align: center; flex-shrink: 0; }
    .rank-1 { color: #B8860B; }
    .rank-2 { color: #888; }
    .rank-3 { color: #8B4513; }
    .lb-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .lb-info { flex: 1; }
    .lb-name { font-size: 14px; font-weight: 600; }
    .lb-name-sub { font-size: 12px; color: var(--muted); }
    .lb-score { text-align: right; }
    .lb-score-num { font-size: 22px; font-weight: 700; color: var(--green-mid); line-height: 1; }
    .lb-score-den { font-size: 11px; color: var(--muted); }
    .lb-mini-bars { display: flex; gap: 2px; margin-top: 5px; justify-content: flex-start; }
    .lb-mini-bar { width: 9px; height: 9px; border-radius: 2px; }

    /* ── EMPTY / ERROR STATES ── */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 400px) {
      .patterns-grid { grid-template-columns: 1fr; }
      .auth-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">STAND<span>ARDS</span></div>
    <div class="auth-sub">Movement methodology. Know your level.</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign in</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign up</button>
    </div>
    <div id="login-form">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@email.com" />
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
      <button class="btn-primary" onclick="signIn()">Sign in</button>
    </div>
    <div id="signup-form" style="display:none">
      <label>Full name</label>
      <input type="text" id="signup-name" placeholder="Your name" />
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@email.com" />
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min 6 characters" />
      <button class="btn-primary" onclick="signUp()">Create account</button>
    </div>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">STAND<span>ARDS</span></div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('profile', this)">My Profile</button>
    <button class="nav-tab" onclick="showTab('leaderboard', this)">Leaderboard</button>
  </div>
  <div class="main">
    <div id="tab-profile"></div>
    <div id="tab-leaderboard" style="display:none"></div>
  </div>
</div>

<script>
// ── SUPABASE INIT ──
const { createClient } = supabase;
const sb = createClient(
  'https://pczfamrjdwbeejoxhxnq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjemZhbXJqZHdiZWVqb3hoeG5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3ODAzNjEsImV4cCI6MjA4OTM1NjM2MX0.trUIKdNicHPRDmleAYoF3nAg8unqQrnQCjKTPB63bI0'
);

// ── STATE ──
let currentUser = null;
let userProfile = null;
let standards = [];
let exercises = [];
let athleteProfile = {};
let allAthleteProfiles = [];
let selectedPattern = null;
let lbFilter = 'all';

const LEVEL_COLORS = ['#ccc','#1A3A2A','#1D6B45','#1D9E75','#5DCAA5','#3DBFA0'];
const LEVEL_LIGHT  = ['#f4f4f2','#E8F2EC','#D4EDE1','#C0E8D4','#A8DFC8','#8FD4BC'];
const AVATAR_COLORS = [
  {bg:'#E1F5EE',fg:'#0F6E56'},{bg:'#EEEDFE',fg:'#534AB7'},
  {bg:'#FAEEDA',fg:'#854F0B'},{bg:'#FAECE7',fg:'#993C1D'},
  {bg:'#E6F1FB',fg:'#185FA5'},{bg:'#F1EFE8',fg:'#444441'},
];

// ── AUTH ──
function switchTab(tab) {
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
  setMsg('','');
}

function setMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = msg;
  el.className = 'auth-msg' + (type ? ' '+type : '');
}

async function signIn() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return setMsg('Please fill in all fields.', 'error');
  setMsg('Signing in…', '');
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) setMsg(error.message, 'error');
}

async function signUp() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!name || !email || !password) return setMsg('Please fill in all fields.', 'error');
  if (password.length < 6) return setMsg('Password must be at least 6 characters.', 'error');
  setMsg('Creating account…', '');
  const { error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
  if (error) setMsg(error.message, 'error');
  else setMsg('Account created! Check your email to confirm, or sign in now.', 'success');
}

async function signOut() {
  await sb.auth.signOut();
  currentUser = null;
  userProfile = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// ── AUTH STATE ──
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    await loadApp();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

// ── LOAD APP ──
async function loadApp() {
  document.getElementById('topbar-user').textContent =
    currentUser.user_metadata?.full_name || currentUser.email;

  // Load all data in parallel
  const [stdRes, exRes, apRes, allApRes] = await Promise.all([
    sb.from('standards').select('*').order('pattern_id').order('level'),
    sb.from('exercises').select('*'),
    sb.from('athlete_profiles').select('*').eq('athlete_id', currentUser.id),
    sb.from('athlete_profiles').select('*, profiles(full_name, email)'),
  ]);

  standards = stdRes.data || [];
  exercises = exRes.data || [];

  // Build athlete profile map
  athleteProfile = {};
  (apRes.data || []).forEach(r => { athleteProfile[r.pattern_id] = r.current_level; });

  allAthleteProfiles = allApRes.data || [];

  renderProfile();
  renderLeaderboard();
}

// ── PROFILE ──
function renderProfile() {
  const patterns = ['Squat','Hinge','HPush','VPush','HPull','VPull','Carry','Core'];
  const patternLabels = {
    Squat:'Squat', Hinge:'Hinge', HPush:'H. Push',
    VPush:'V. Push', HPull:'H. Pull', VPull:'V. Pull',
    Carry:'Carry', Core:'Core'
  };

  const total = patterns.reduce((s,p) => s + (athleteProfile[p]||0), 0);
  const initials = (currentUser.user_metadata?.full_name || currentUser.email)
    .split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const name = currentUser.user_metadata?.full_name || currentUser.email;

  let html = `
    <div class="profile-header">
      <div class="avatar">${initials}</div>
      <div>
        <div class="profile-name">${name}</div>
        <div class="profile-sub">Athlete · STANDARDS</div>
      </div>
      <div class="score-chip">${total} / 40</div>
    </div>
    <div class="section-label">Movement Standards</div>
    <div class="patterns-grid">
  `;

  patterns.forEach(pid => {
    const lvl = athleteProfile[pid] || 0;
    const pct = (lvl/5)*100;
    const col = LEVEL_COLORS[lvl];
    const bgCol = LEVEL_LIGHT[lvl];
    const std = standards.find(s => s.pattern_id===pid && s.level===lvl);
    const ex = std ? std.test_exercise : '—';
    const loadStd = std ? std.load_standard : '—';
    const isActive = selectedPattern === pid;

    html += `
      <div class="pattern-card${isActive?' active':''}" onclick="selectPattern('${pid}')">
        <div class="pattern-top">
          <span class="pattern-name">${patternLabels[pid]}</span>
          <span class="level-chip" style="background:${bgCol};color:${col}">L${lvl}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${col}"></div>
        </div>
        <div class="pattern-bottom">
          <span class="pattern-ex">${ex}</span>
          <span class="pattern-std">${loadStd}</span>
        </div>
      </div>
    `;
  });

  html += `</div>`;

  if (selectedPattern) {
    html += renderPatternDetail(selectedPattern);
  }

  document.getElementById('tab-profile').innerHTML = html;
}

function renderPatternDetail(pid) {
  const lvl = athleteProfile[pid] || 0;
  const patternLabels = {
    Squat:'Squat', Hinge:'Hinge', HPush:'Horizontal Push',
    VPush:'Vertical Push', HPull:'Horizontal Pull', VPull:'Vertical Pull',
    Carry:'Carry', Core:'Core'
  };

  if (lvl === 0) {
    return `<div class="detail-card">
      <div class="detail-header">
        <div class="detail-title">${patternLabels[pid]}</div>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="empty-state"><div class="empty-icon">📋</div>Not yet assessed. Ask your coach to run your assessment.</div>
    </div>`;
  }

  // Get exercises for this pattern at this level
  const patternExercises = exercises.filter(e =>
    e.pattern_id === pid && e.level_focus === lvl
  );
  const mainEx = patternExercises.find(e => e.type === 'Main');
  const bridgeEx = patternExercises.find(e => e.type === 'Bridge');
  const limiterEx = patternExercises.find(e => e.type === 'Limiter');

  const std = standards.find(s => s.pattern_id===pid && s.level===lvl);
  const nextStd = standards.find(s => s.pattern_id===pid && s.level===lvl+1);

  const reps = {
    Control: '3×8–12', Unilateral: '3×6–8/side', Force: '5×3–5', Expression: '4×5–8'
  };
  const tempo = {
    Control: '3131', Unilateral: '3121', Force: '20X0', Expression: '10X0'
  };

  function exBlock(ex, tag, tagClass) {
    if (!ex) return '';
    const intent = ex.intent || 'Control';
    return `<div class="ex-block">
      <div class="ex-type-tag ${tagClass}">${tag}</div>
      <div class="ex-name">${ex.name}</div>
      <div class="ex-row-bottom">
        <span class="ex-cue">"${ex.coaching_cue || '—'}"</span>
        <span class="ex-sets">${reps[intent]||'3×8'} · ${tempo[intent]||'31X1'}</span>
      </div>
    </div>`;
  }

  const nextSection = nextStd
    ? `<div class="next-standard"><strong>Next standard →</strong> Level ${lvl+1}: ${nextStd.test_exercise} · ${nextStd.load_standard}</div>`
    : `<div class="max-level">🏆 Maximum level achieved</div>`;

  return `
    <div class="detail-card">
      <div class="detail-header">
        <div class="detail-title">${patternLabels[pid]} · Level ${lvl} — ${std?.quality_focus||''}</div>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
      ${exBlock(mainEx, 'MAIN', 'tag-main')}
      ${exBlock(bridgeEx, 'BRIDGE', 'tag-bridge')}
      ${exBlock(limiterEx, 'LIMITER', 'tag-limiter')}
      ${!mainEx && !bridgeEx && !limiterEx ? `<div style="font-size:13px;color:var(--muted);padding:8px 0">Exercise details loading — check your exercise library.</div>` : ''}
      ${nextSection}
    </div>
  `;
}

function selectPattern(pid) {
  selectedPattern = selectedPattern === pid ? null : pid;
  renderProfile();
  if (selectedPattern) {
    setTimeout(() => {
      const el = document.querySelector('.detail-card');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

function closeDetail() {
  selectedPattern = null;
  renderProfile();
}

// ── LEADERBOARD ──
function renderLeaderboard() {
  const patterns = ['Squat','Hinge','HPush','VPush','HPull','VPull','Carry','Core'];

  // Aggregate scores per athlete
  const athleteMap = {};
  allAthleteProfiles.forEach(row => {
    const aid = row.athlete_id;
    if (!athleteMap[aid]) {
      athleteMap[aid] = {
        id: aid,
        name: row.profiles?.full_name || row.profiles?.email || 'Athlete',
        scores: {}
      };
    }
    athleteMap[aid].scores[row.pattern_id] = row.current_level;
  });

  let athletes = Object.values(athleteMap);

  // Calculate display score based on filter
  athletes = athletes.map((a, i) => ({
    ...a,
    displayScore: lbFilter === 'all'
      ? patterns.reduce((s,p) => s + (a.scores[p]||0), 0)
      : (a.scores[lbFilter]||0),
    maxScore: lbFilter === 'all' ? 40 : 5,
    colorIdx: i % AVATAR_COLORS.length,
  })).sort((a,b) => b.displayScore - a.displayScore);

  const filterLabels = {
    all:'All', Squat:'Squat', Hinge:'Hinge',
    HPush:'H.Push', VPush:'V.Push', HPull:'H.Pull', VPull:'V.Pull', Carry:'Carry', Core:'Core'
  };

  let html = `<div class="lb-filters">`;
  ['all','Squat','Hinge','HPush','VPush','HPull','VPull','Carry','Core'].forEach(f => {
    html += `<button class="lb-filter${lbFilter===f?' active':''}" onclick="setLbFilter('${f}')">${filterLabels[f]}</button>`;
  });
  html += `</div>`;

  if (athletes.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">🏆</div>No athletes assessed yet.</div>`;
  } else {
    athletes.forEach((a, i) => {
      const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
      const isMe = a.id === currentUser.id;
      const col = AVATAR_COLORS[a.colorIdx];
      const initials = a.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

      // Mini bars for all-pattern view
      let miniBars = '';
      if (lbFilter === 'all') {
        miniBars = `<div class="lb-mini-bars">`;
        patterns.forEach(p => {
          const lvl = a.scores[p]||0;
          miniBars += `<div class="lb-mini-bar" style="background:${LEVEL_COLORS[lvl]}" title="${p}: L${lvl}"></div>`;
        });
        miniBars += `</div>`;
      }

      html += `
        <div class="lb-row${isMe?' me':''}">
          <div class="lb-rank ${rankClass}">${i+1}</div>
          <div class="lb-avatar" style="background:${col.bg};color:${col.fg}">${initials}</div>
          <div class="lb-info">
            <div class="lb-name">${a.name}${isMe?' <span style="font-size:11px;color:var(--green-mid)">(you)</span>':''}</div>
            <div class="lb-name-sub">${lbFilter==='all'?'Overall movement profile':filterLabels[lbFilter]+' pattern'}</div>
            ${miniBars}
          </div>
          <div class="lb-score">
            <div class="lb-score-num">${a.displayScore}</div>
            <div class="lb-score-den">/ ${a.maxScore}</div>
          </div>
        </div>
      `;
    });
  }

  document.getElementById('tab-leaderboard').innerHTML = html;
}

function setLbFilter(f) {
  lbFilter = f;
  renderLeaderboard();
}

// ── TABS ──
function showTab(tab, btn) {
  document.getElementById('tab-profile').style.display = tab==='profile' ? 'block' : 'none';
  document.getElementById('tab-leaderboard').style.display = tab==='leaderboard' ? 'block' : 'none';
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}
</script>
</body>
</html>
